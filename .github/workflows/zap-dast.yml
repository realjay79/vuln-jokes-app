name: OWASP ZAP DAST Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Run ZAP DAST Scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Environment and Start App
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm golang-go

          # Start backend on :8080
          cd backend
          nohup go run main.go > backend.log 2>&1 &

          # Start frontend on :3000
          cd ../frontend
          npm install
          nohup npm start > frontend.log 2>&1 &

          # Wait for both servers to be ready
          sleep 30

      - name: Run ZAP Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:3000'
          fail_action: false  # Set to true if you want to fail build on issues