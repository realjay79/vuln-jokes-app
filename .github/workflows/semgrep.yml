name: Semgrep SAST & SCA Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    name: Semgrep Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          semgrep scan --config "p/owasp-top-ten" --error

      - name: Run Semgrep SCA
        run: |
          semgrep supply-chain scan
