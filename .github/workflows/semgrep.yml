name: Semgrep SAST & SCA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    name: Semgrep SAST & SCA

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST (Go + React)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/react" \
            --config "p/javascript" \
            --config "p/golang" \
            --json --output semgrep-sast.json \
            frontend backend

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-sast.json

      - name: Run Semgrep SCA
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep supply-chain scan --json --output semgrep-sca.json || true

      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sca-report
          path: semgrep-sca.json