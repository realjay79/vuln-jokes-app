name: Semgrep SAST and SCA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  semgrep:
    name: Run Semgrep SAST and SCA
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          pip3 install semgrep

      #############################################
      # 🛡️ SAST Scan — Custom Rules for Code
      #############################################
      - name: Run SAST Scan (Custom Rules)
        run: |
          semgrep ci \
            --config jokes-vuln-rules.yml \
            --metrics=off \
            --json > semgrep-sast-report.json

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-sast-report.json

      #############################################
      # 📦 SCA Scan — Dependency Vulnerabilities
      #############################################
      - name: Run SCA Scan
        run: |
          semgrep ci \
            --config auto \
            --dependency \
            --metrics=off \
            --json > semgrep-sca-report.json

      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sca-report
          path: semgrep-sca-report.json
