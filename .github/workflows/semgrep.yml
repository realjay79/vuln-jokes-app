name: Semgrep SAST & SCA Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Semgrep SAST & SCA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST (Go + React)
        run: |
          semgrep scan --config "p/owasp-top-ten" frontend backend --error

      - name: Run Semgrep Supply Chain (SCA)
        run: |
          semgrep supply-chain scan --json --output semgrep-sca.json || true

      - name: Upload SCA Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sca-report
          path: semgrep-sca.json