name: Semgrep SAST and SCA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Run Semgrep SAST and SCA
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          pip3 install semgrep

      #############################################
      # 🛡️ SAST Scan — Custom Rules for Code
      #############################################
      - name: Run SAST CI (SAST + SCA)
        run: |
          semgrep ci \
            --metrics=off \
            --json > semgrep-ci-report.json

      - name: Upload Semgrep CI Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ci-report
          path: semgrep-ci-report.json